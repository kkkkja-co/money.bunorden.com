<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1d27"/>
      <stop offset="100%" style="stop-color:#0f1117"/>
    </linearGradient>
    <linearGradient id="keyD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glowD" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="88" fill="url(#bgD)"/>
  <rect width="400" height="400" rx="88" fill="none" stroke="#6c63ff" stroke-width="1" stroke-opacity="0.25"/>

  <!-- Ring -->
  <circle cx="200" cy="162" r="64" fill="none" stroke="url(#keyD)" stroke-width="22" stroke-linecap="round" filter="url(#glowD)"/>

  <!-- Inner hole -->
  <circle cx="200" cy="162" r="18" fill="url(#keyD)" filter="url(#glowD)"/>

  <!-- Shaft -->
  <rect x="189" y="224" width="22" height="95" rx="11" fill="url(#keyD)" filter="url(#glowD)"/>

  <!-- Tooth 1 -->
  <rect x="211" y="248" width="28" height="16" rx="8" fill="url(#keyD)"/>

  <!-- Tooth 2 -->
  <rect x="211" y="278" width="20" height="16" rx="8" fill="url(#keyD)"/>
</svg>
