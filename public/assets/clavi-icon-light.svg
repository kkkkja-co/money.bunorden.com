<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#eff0f7"/>
    </linearGradient>
    <linearGradient id="keyL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b52f0"/>
      <stop offset="100%" style="stop-color:#8b7cf8"/>
    </linearGradient>
    <filter id="glowL" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="88" fill="url(#bgL)"/>
  <rect width="400" height="400" rx="88" fill="none" stroke="#8b7cf8" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Ring -->
  <circle cx="200" cy="162" r="64" fill="none" stroke="url(#keyL)" stroke-width="22" stroke-linecap="round" filter="url(#glowL)"/>

  <!-- Inner dot -->
  <circle cx="200" cy="162" r="18" fill="url(#keyL)" filter="url(#glowL)"/>

  <!-- Shaft -->
  <rect x="189" y="224" width="22" height="95" rx="11" fill="url(#keyL)" filter="url(#glowL)"/>

  <!-- Tooth 1 -->
  <rect x="211" y="248" width="28" height="16" rx="8" fill="url(#keyL)"/>

  <!-- Tooth 2 -->
  <rect x="211" y="278" width="20" height="16" rx="8" fill="url(#keyL)"/>
</svg>
